<!DOCTYPE html>
<html>
<head>
    <title>Add Expense - FinTrack</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>💰 FinTrack</h2>

    <div>
        <a class="nav-btn" href="/dashboard">
            Dashboard
        </a>

        <a class="logout-btn" href="/logout">
            Logout
        </a>
    </div>
</div>

<h1>➕ Add Expense</h1>

<div class="card" style="max-width:600px; margin:auto;">

    <form method="POST">

        <label><strong>Title</strong></label>
        <br><br>

        <input
            type="text"
            name="title"
            placeholder="Expense title"
            required
            style="
                width:100%;
                padding:12px;
                border:1px solid #ccc;
                border-radius:8px;
                box-sizing:border-box;
            "
        >

        <br><br>

        <label><strong>Amount (₹)</strong></label>
        <br><br>

        <input
            type="number"
            step="0.01"
            min="0.01"
            name="amount"
            placeholder="Enter amount"
            required
            style="
                width:100%;
                padding:12px;
                border:1px solid #ccc;
                border-radius:8px;
                box-sizing:border-box;
            "
        >

        <br><br>

        <label><strong>Category</strong></label>
        <br><br>

        <input
            type="text"
            name="category"
            placeholder="Food, Travel, Shopping..."
            required
            style="
                width:100%;
                padding:12px;
                border:1px solid #ccc;
                border-radius:8px;
                box-sizing:border-box;
            "
        >

        <br><br>

        <label><strong>Date</strong></label>
        <br><br>

        <input
            type="date"
            name="date"
            required
            style="
                width:100%;
                padding:12px;
                border:1px solid #ccc;
                border-radius:8px;
                box-sizing:border-box;
            "
        >

        <br><br>

        <button
            type="submit"
            class="nav-btn"
            style="border:none; cursor:pointer;"
        >
            Add Expense
        </button>

        <a
            href="/dashboard"
            class="nav-btn"
            style="margin-left:10px;"
        >
            Cancel
        </a>

    </form>

</div>

<footer>
    <p>
        FinTrack © 2026 | Built by Yeshwanth Reddy
    </p>
</footer>

</body>
</html>
